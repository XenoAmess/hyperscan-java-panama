name: Performance Report

on:
  workflow_run:
    workflows: ["Build and Test"]
    types:
      - completed
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  benchmark:
    name: Run performance benchmarks
    runs-on: ubuntu-24.04
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    env:
      BENCHMARK_PLATFORM: linux-x86_64
      BENCHMARK_OUTPUT_DIR: _site
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download merged native artifacts (from triggering run)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: native-merged
          path: target/staging-deploy
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download latest merged native artifacts (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: build.yml
          branch: main
          name: native-merged
          path: target/staging-deploy
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install native artifacts to local Maven
        run: |
          set -euo pipefail
          mkdir -p ~/.m2/repository
          cp -r target/staging-deploy/com ~/.m2/repository/
          find ~/.m2/repository/com/xenoamess/hyperscan_panama

      - name: Run performance tests
        run: |
          set -euo pipefail
          mvn -B test -pl performance -Dnative.classifier=${BENCHMARK_PLATFORM}

      - name: Generate HTML/SVG report
        run: |
          set -euo pipefail
          mkdir -p ${BENCHMARK_OUTPUT_DIR}
          python3 .github/scripts/generate-performance-report.py \
            performance/target/benchmark-results/benchmark-result.json \
            ${BENCHMARK_OUTPUT_DIR}/index.html \
            ${BENCHMARK_OUTPUT_DIR}/chart.svg
          python3 .github/scripts/generate-performance-svg.py \
            performance/target/benchmark-results/benchmark-result.json \
            ${BENCHMARK_OUTPUT_DIR}/chart.svg

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: benchmark
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
