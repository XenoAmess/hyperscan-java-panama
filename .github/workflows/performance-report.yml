name: Performance Report

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  benchmark:
    name: Run performance benchmarks
    runs-on: ubuntu-24.04
    env:
      DETECTED_PLATFORM: linux-x86_64-avx2
      BENCHMARK_OUTPUT_DIR: _site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build and install native module
        run: |
          set -euo pipefail
          mvn -B install -pl native -DskipTests

      - name: Run performance tests
        run: |
          set -euo pipefail
          mvn -B test -pl performance -am -Dnative.classifier=${DETECTED_PLATFORM}

      - name: Generate HTML/SVG report
        run: |
          set -euo pipefail
          mkdir -p ${BENCHMARK_OUTPUT_DIR}
          python3 .github/scripts/generate-performance-report.py \
            performance/target/benchmark-results/benchmark-result.json \
            ${BENCHMARK_OUTPUT_DIR}/index.html \
            ${BENCHMARK_OUTPUT_DIR}/chart.svg
          python3 .github/scripts/generate-performance-svg.py \
            performance/target/benchmark-results/benchmark-result.json \
            ${BENCHMARK_OUTPUT_DIR}/chart.svg

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: benchmark
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
