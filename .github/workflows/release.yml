name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Download merged native artifacts
        uses: actions/download-artifact@v4
        with:
          name: native-merged
          path: target/staging-deploy

      - name: Install native artifacts to local Maven
        run: |
          set -euo pipefail
          mkdir -p ~/.m2/repository
          cp -r target/staging-deploy/com ~/.m2/repository/
          find ~/.m2/repository/com/xenoamess/hyperscan_panama

      - name: Build and install wrapper
        run: |
          set -euo pipefail
          mvn -B install -pl wrapper -DskipTests \
            -Dnative.classifier=linux-x86_64

      - name: Copy wrapper artifacts to staging deploy
        run: |
          set -euo pipefail
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          SRC="$HOME/.m2/repository/com/xenoamess/hyperscan_panama/hyperscan-java-panama/$VERSION"
          DST="$PWD/target/staging-deploy/com/xenoamess/hyperscan_panama/hyperscan-java-panama/$VERSION"
          mkdir -p "$DST"
          cp "$SRC"/* "$DST/"
          find target/staging-deploy -type f

      - name: Set up JReleaser
        uses: jreleaser/release-action@v2
        with:
          setup-only: true
          version: 1.14.0

      - name: Deploy to Maven Central
        run: jreleaser deploy --debug
        env:
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.SIGN_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.SIGN_KEY_PASS }}

      - name: Collect JARs for GitHub Release
        run: |
          mkdir -p release-jars
          cp target/staging-deploy/com/xenoamess/hyperscan_panama/*/*/*/*.jar release-jars/ || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-jars/*.jar
          generate_release_notes: true
