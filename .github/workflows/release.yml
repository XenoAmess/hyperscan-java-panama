name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libboost-dev ragel

      - name: Build native libraries
        run: |
          cd native
          DETECTED_PLATFORM=linux-x86_64-avx2 ./build.sh
        env:
          DETECTED_PLATFORM: linux-x86_64-avx2

      - name: Build and test
        run: |
          cd ${{ github.workspace }}
          DETECTED_PLATFORM=linux-x86_64-avx2 mvn verify -pl wrapper -am
        env:
          DETECTED_PLATFORM: linux-x86_64-avx2

      - name: Collect JARs
        run: |
          mkdir -p release-jars
          cp native/target/*.jar release-jars/ || true
          cp wrapper/target/*.jar release-jars/ || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-jars/*.jar
          generate_release_notes: true
