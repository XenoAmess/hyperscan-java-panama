name: Release

on:
  workflow_dispatch:
    inputs:
      nativeVersion:
        description: 'Native artifact version (leave empty for auto)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Download latest merged native artifacts
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: build.yml
          branch: main
          name: native-merged
          path: target/staging-deploy
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install native artifacts to local Maven
        run: |
          set -euo pipefail
          mkdir -p ~/.m2/repository
          cp -r target/staging-deploy/com ~/.m2/repository/
          find ~/.m2/repository/com/xenoamess/hyperscan_panama

      - name: Build and install wrapper
        run: |
          set -euo pipefail
          mvn -B install -N -DskipTests
          mvn -B install -pl wrapper -DskipTests \
            -Dnative.classifier=linux-x86_64

      - name: Copy wrapper artifacts to staging deploy
        run: |
          set -euo pipefail
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          # Copy parent POM
          PARENT_SRC="$HOME/.m2/repository/com/xenoamess/hyperscan_panama/hyperscan-java-panama-parent/$VERSION"
          PARENT_DST="$PWD/target/staging-deploy/com/xenoamess/hyperscan_panama/hyperscan-java-panama-parent/$VERSION"
          mkdir -p "$PARENT_DST"
          cp "$PARENT_SRC"/*.pom "$PARENT_DST/"
          # Copy wrapper (jar, pom, sources, javadoc only)
          SRC="$HOME/.m2/repository/com/xenoamess/hyperscan_panama/hyperscan-java-panama/$VERSION"
          DST="$PWD/target/staging-deploy/com/xenoamess/hyperscan_panama/hyperscan-java-panama/$VERSION"
          mkdir -p "$DST"
          cp "$SRC"/*.jar "$DST/" 2>/dev/null || true
          cp "$SRC"/*.pom "$DST/" 2>/dev/null || true
          # Clean any _remote.repositories or checksum files from staging
          find target/staging-deploy -name '_remote.repositories*' -delete
          find target/staging-deploy -name '*.sha1' -delete
          find target/staging-deploy -name '*.sha256' -delete
          find target/staging-deploy -name '*.sha512' -delete
          find target/staging-deploy -name '*.md5' -delete
          find target/staging-deploy -name '*.asc' -delete
          find target/staging-deploy -type f

      - name: Deploy to Maven Central
        uses: jreleaser/release-action@v2
        with:
          version: 1.14.0
          arguments: deploy
        env:
          JRELEASER_PROJECT_VERSION: ${{ github.event.inputs.nativeVersion || '5.4.12-rc6' }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.SIGN_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.SIGN_KEY_PASS }}

      - name: Collect JARs for GitHub Release
        run: |
          mkdir -p release-jars
          cp target/staging-deploy/com/xenoamess/hyperscan_panama/*/*/*/*.jar release-jars/ || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ github.event.inputs.nativeVersion || '5.4.12-rc6' }}
          files: release-jars/*.jar
          generate_release_notes: true
          prerelease: true
